[changelog]
# Changelog configuration
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ date | date(format="%Y-%m-%d") }}
{% else -%}
    ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | capitalize }}
    {% for commit in commits %}
        - {% if commit.breaking %}(breaking) {% endif %}{{ commit.message | upper_first }}{% if commit.scope %} ({{ commit.scope }}){% endif %}
    {% endfor %}
{% endfor %}

{% if version -%}
    {% if previous.version -%}
        {% if previous.commit_id -%}
            [{{ previous.version | trim_start_matches(pat="v") }}]: https://github.com/SHA888/clinical-rs/compare/{{ previous.commit_id | truncate(length=7, end="") }}...{{ commit_id | truncate(length=7, end="") }}
        {% endif -%}
    {% endif -%}
{% endif -%}
"""
trim = true

[git]
# Git configuration
conventional_commits = true
filter_commits = "feat|fix|docs|style|refactor|perf|test|ci|chore|revert"
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^docs", group = "Documentation" },
    { message = "^style", group = "Style" },
    { message = "^refactor", group = "Refactored" },
    { message = "^perf", group = "Performance" },
    { message = "^test", group = "Testing" },
    { message = "^ci", group = "CI" },
    { message = "^chore", group = "Chore" },
    { message = "^revert", group = "Reverted" },
]
filter_bodies = false
commit_preprocessors = [
    { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/SHA888/clinical-rs/issues/${2}))" },
]
protect_breaking_commits = true
sort_commits = "oldest"

# Per-crate changelog generation
[[crates]]
name = "medcodes"
changelog_path = "crates/medcodes/CHANGELOG.md"
filter_paths = ["crates/medcodes/"]

[[crates]]
name = "mimic-etl"
changelog_path = "crates/mimic-etl/CHANGELOG.md"
filter_paths = ["crates/mimic-etl/"]

[[crates]]
name = "clinical-tasks"
changelog_path = "crates/clinical-tasks/CHANGELOG.md"
filter_paths = ["crates/clinical-tasks/"]

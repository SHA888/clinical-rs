name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install git-cliff
        run: cargo install git-cliff@2.12 --locked

      - name: Generate changelog
        run: |
          git-cliff --latest --prepend CHANGELOG.md
          git add CHANGELOG.md
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "docs: update changelog for release" || true

      - name: Publish medcodes
        if: contains(github.ref, 'refs/tags/')
        run: cargo publish -p medcodes

      - name: Wait for medcodes to be available
        if: contains(github.ref, 'refs/tags/')
        run: sleep 30

      - name: Publish mimic-etl
        if: contains(github.ref, 'refs/tags/')
        run: cargo publish -p mimic-etl

      - name: Wait for mimic-etl to be available
        if: contains(github.ref, 'refs/tags/')
        run: sleep 30

      - name: Publish clinical-tasks
        if: contains(github.ref, 'refs/tags/')
        run: cargo publish -p clinical-tasks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
